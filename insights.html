<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MarketHunters 블로그</title>
  <meta name="description" content="주식, 시장, 정보는 MarketHunters 블로그 와" />
  <meta name="theme-color" content="#07172f" />
  <link rel="canonical" href="https://markethunters.kr/insights.html" />
  <meta name="robots" content="index, follow" />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body{
      background: radial-gradient(circle at top, #0b1d3a 0%, #061427 45%, #04101e 100%);
      color:#eaf2ff;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }

    .container{
      width:min(1180px, calc(100% - 28px));
      margin:0 auto;
      padding:28px 0 120px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      font-size:20px;
      letter-spacing:-.02em;
    }

    .brand-badge{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, #15396d, #0a1f3d);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      color:#9fc2ff;
      font-size:16px;
      font-weight:900;
    }

    .hero{
      background: linear-gradient(135deg, rgba(18,38,76,.96), rgba(7,22,44,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:34px;
      box-shadow:0 22px 54px rgba(0,0,0,.28);
      margin-bottom:24px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      height:34px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(81,132,255,.18);
      color:#dce9ff;
      font-size:13px;
      font-weight:800;
      letter-spacing:-.01em;
    }

    .hero h1{
      margin:14px 0 10px;
      font-size:40px;
      line-height:1.22;
      letter-spacing:-.03em;
      color:#f6f9ff;
    }

    .hero p{
      margin:0;
      color:#aebed6;
      font-size:16px;
      line-height:1.8;
      max-width:780px;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:16px 0 14px;
    }

    .section-head h2{
      margin:0;
      font-size:22px;
      letter-spacing:-.02em;
    }

    .count{
      color:#9fb3ce;
      font-size:14px;
      font-weight:700;
    }

    .grid-posts{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
    }

    .post-card{
      background: linear-gradient(180deg, rgba(7,28,58,.96), rgba(3,19,41,.98));
      border:1px solid rgba(91,138,214,.22);
      border-radius:24px;
      padding:22px;
      min-height:260px;
      display:flex;
      flex-direction:column;
      box-shadow:0 14px 34px rgba(0,0,0,.24);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .post-card:hover{
      transform:translateY(-3px);
      border-color:rgba(132,176,255,.34);
      box-shadow:0 20px 40px rgba(0,0,0,.3);
    }

    .post-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .post-date{
      color:#96aac8;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .post-title{
      color:#f3f7ff;
      font-size:29px;
      line-height:1.34;
      font-weight:900;
      letter-spacing:-.03em;
      display:block;
      margin-bottom:14px;
      word-break:keep-all;
    }

    .post-summary{
      color:#c6d3e6;
      font-size:16px;
      line-height:1.78;
      margin:0 0 24px;
      flex:1;
      word-break:keep-all;
    }

    .post-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:auto;
    }

    .post-author{
      color:#d6e4ff;
      font-size:14px;
      font-weight:800;
    }

    .post-link{
      color:#9fc2ff;
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
    }

    .empty{
      background: linear-gradient(180deg, rgba(7,28,58,.96), rgba(3,19,41,.98));
      border:1px solid rgba(91,138,214,.22);
      border-radius:24px;
      padding:28px;
      color:#afc1da;
      line-height:1.8;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      width:min(92vw, 640px);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      padding:10px;
      z-index:40;
      border-radius:24px;
      background:rgba(6,19,40,.82);
      backdrop-filter: blur(16px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 34px rgba(0,0,0,.28);
    }

    .bottom-item{
      padding:12px 10px;
      border-radius:16px;
      text-align:center;
      color:#cad7ec;
      font-weight:800;
      font-size:15px;
    }

    .bottom-item.active{
      background:#0a2244;
      color:#ffffff;
    }

    @media (max-width: 980px){
      .grid-posts{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }

      .hero h1{
        font-size:34px;
      }

      .post-title{
        font-size:25px;
      }
    }

    @media (max-width: 640px){
      .container{
        width:min(100%, calc(100% - 16px));
        padding:18px 0 120px;
      }

      .hero{
        padding:24px 20px;
        border-radius:24px;
      }

      .hero h1{
        font-size:28px;
      }

      .hero p{
        font-size:15px;
      }

      .grid-posts{
        grid-template-columns:1fr;
      }

      .post-card{
        min-height:auto;
      }

      .post-title{
        font-size:23px;
      }

      .post-summary{
        font-size:15px;
      }

      .bottom-nav{
        width:min(94vw, 640px);
      }

      .bottom-item{
        font-size:14px;
        padding:12px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a class="brand" href="/index.html">
        <span class="brand-badge">MH</span>
        <span>MarketHunters</span>
      </a>
    </header>

    <section class="hero">
      <span class="chip">블로그</span>
      <h1>주식, 시장, AI 투자에 대한 읽기 좋은 분석</h1>
      <p>
        MarketHunters 블로그에서는 투자 초보자도 이해하기 쉬운 방식으로
        종목 분석, 시장 흐름, 금리와 경제 지표, AI 투자 트렌드를 정리합니다.
      </p>
    </section>

    <div class="section-head">
      <h2>최신 글</h2>
      <div class="count" id="countText">불러오는 중...</div>
    </div>

    <div id="posts"></div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="bottom-item">홈</a>
    <a href="/index.html#search-section" class="bottom-item">검색</a>
    <a href="/index.html#calendar-section" class="bottom-item">지표</a>
    <a href="/stock.html?symbol=NVDA" class="bottom-item">종목</a>
    <a href="/insights.html" class="bottom-item active">블로그</a>
  </nav>

  <script>
    const API_BASE = "https://api.markethunters.kr/api/content";

    function stripHtml(html) {
      return String(html || "").replace(/<[^>]*>/g, " ");
    }

    function cleanText(text) {
      return String(text || "")
        .replace(/```html/gi, "")
        .replace(/```/g, "")
        .replace(/<\/?title>/gi, "")
        .replace(/<\/?html>/gi, "")
        .replace(/<\/?head>/gi, "")
        .replace(/<\/?body>/gi, "")
        .replace(/^\s*제목\s*:\s*/i, "")
        .replace(/^\s*요약\s*:\s*/i, "")
        .trim();
    }

    function excerpt(text, len = 100) {
      const t = cleanText(stripHtml(text)).replace(/\s+/g, " ").trim();
      return t.length > len ? t.slice(0, len) + "..." : t;
    }

    function formatDate(value) {
      if (!value) return "";
      return String(value).replaceAll("-", ".");
    }

    async function loadPosts() {
      const wrap = document.getElementById("posts");
      const countText = document.getElementById("countText");

      try {
        const res = await fetch(API_BASE);
        const posts = await res.json();

        countText.textContent = `총 ${posts.length}개 글`;

        if (!posts || !posts.length) {
          wrap.innerHTML = `
            <div class="empty">
              아직 등록된 글이 없습니다.<br>
              Cron Job이 실행된 뒤 다시 확인해 주세요.
            </div>
          `;
          return;
        }

        let html = `<section class="grid-posts">`;

        posts.forEach((p) => {
          const title = cleanText(p.title || "");
          const summary = p.summary ? excerpt(p.summary, 88) : excerpt(p.content, 88);

          html += `
            <article class="post-card">
              <div class="post-top">
                <span class="chip">${p.category || "블로그"}</span>
                <span class="post-date">${formatDate(p.published_date || "")}</span>
              </div>

              <a class="post-title" href="/insight.html?id=${encodeURIComponent(p.id)}">
                ${title}
              </a>

              <p class="post-summary">${summary}</p>

              <div class="post-bottom">
                <span class="post-author">작성자 ${p.author || "Markethunters"}</span>
                <a class="post-link" href="/insight.html?id=${encodeURIComponent(p.id)}">읽어보기 →</a>
              </div>
            </article>
          `;
        });

        html += `</section>`;
        wrap.innerHTML = html;
      } catch (e) {
        countText.textContent = "불러오기 실패";
        wrap.innerHTML = `
          <div class="empty">
            글 목록을 불러오지 못했습니다.<br>
            API 주소와 CORS, 백엔드 배포 상태를 확인해 주세요.
          </div>
        `;
        console.error("loadPosts error:", e);
      }
    }

    loadPosts();
  </script>
</body>
</html>
