<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MarketHunters 블로그</title>
  <meta name="description" content="MarketHunters 블로그 글을 확인하세요." />
  <meta name="theme-color" content="#07172f" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css?v=20260408-blog-1" />
  <style>
    .article-shell{max-width:980px;margin:0 auto;padding:18px 16px 96px}
    .article-wrap{padding:24px 22px 28px}
    .article-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
    .article-kicker{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(80,160,255,.14);color:#b9d3ff;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .article-title{margin:12px 0 0;font-size:34px;line-height:1.28;color:#fff;letter-spacing:-.02em}
    .article-summary{margin:16px 0 0;color:#c9d7ea;font-size:16px;line-height:1.8}
    .article-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;color:#97abc4;font-size:13px}
    .article-body{margin-top:26px;padding-top:22px;border-top:1px solid rgba(255,255,255,.07);color:#e7eef8;font-size:17px;line-height:1.9}
    .article-body h2{margin:34px 0 14px;font-size:24px;line-height:1.35;color:#fff}
    .article-body p{margin:0 0 16px;color:#d8e4f4}
    .article-body ul{margin:0 0 20px 20px;padding:0}
    .article-body li{margin-bottom:10px;color:#d8e4f4}
    .article-body strong{color:#fff}
    .article-side{display:grid;gap:14px;margin-top:18px}
    .article-card{padding:18px;border-radius:20px}
    .article-card h3{margin:0 0 10px;font-size:17px;color:#fff}
    .article-card p,.article-card a{color:#aecaeb;line-height:1.7}
    .article-layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:18px}
    .mini-link{display:block;text-decoration:none;padding:12px 0;border-top:1px solid rgba(255,255,255,.06)}
    .mini-link:first-of-type{border-top:none;padding-top:0}
    .mini-link strong{display:block;color:#eef4ff;margin-bottom:4px;line-height:1.45}
    .mini-link span{display:block;font-size:13px;color:#97abc4}
    .loading-box,.error-box{padding:28px;text-align:center;color:#b8c9df}
    .loading-box strong,.error-box strong{display:block;color:#fff;margin-bottom:8px;font-size:18px}
    @media (max-width:900px){.article-layout{grid-template-columns:1fr}.article-title{font-size:29px}.article-body{font-size:16px}}
    @media (max-width:640px){.article-shell{padding:14px 12px 96px}.article-wrap{padding:20px 16px 22px}.article-title{font-size:25px}.article-summary{font-size:15px}.article-body h2{font-size:21px}}
  </style>
</head>
<body>
  <div class="article-shell">
    <header class="app-header glass-card" style="margin-bottom:16px;">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="MarketHunters 로고" class="brand-logo" />
        <div>
          <div class="brand-name">MarketHunters</div>
          <div class="brand-sub">실전형 AI 투자 정보 허브</div>
        </div>
      </div>
      <div class="lang-switch">
        <a href="/insights.html" class="lang-btn active">블로그 목록</a>
      </div>
    </header>

    <div class="article-layout">
      <article id="article-wrap" class="article-wrap glass-card">
        <div class="loading-box">
          <strong>글을 불러오는 중입니다.</strong>
          잠시만 기다려 주세요.
        </div>
      </article>

      <aside class="article-side">
        <section class="article-card glass-card">
          <h3>이 글의 성격</h3>
          <p>단순 요약이 아니라 투자자가 실제로 확인해야 할 포인트와 리스크를 함께 정리한 읽을거리입니다.</p>
        </section>
        <section class="article-card glass-card">
          <h3>최근 글</h3>
          <div id="latest-posts"></div>
        </section>
      </aside>
    </div>
  </div>

  <nav class="bottom-nav glass-card">
    <a href="index.html" class="bottom-item">홈</a>
    <a href="index.html#search-section" class="bottom-item">검색</a>
    <a href="index.html#calendar-section" class="bottom-item">지표</a>
    <a href="stock.html?symbol=NVDA" class="bottom-item">종목</a>
    <a href="/insights.html" class="bottom-item active">블로그</a>
  </nav>

  <script>
    const API_BASE = "https://api.markethunters.kr/api/content";
    const articleWrap = document.getElementById("article-wrap");
    const latestPostsEl = document.getElementById("latest-posts");
    const categoryLabel = {
      guide: "투자 가이드",
      analysis: "종목 분석",
      market: "시장 해설",
      top: "테마 인사이트",
    };

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>\"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[s]));
    }

    function formatDate(value) {
      if (!value) return "날짜 미정";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
    }

    function sanitizeHtml(html) {
      return String(html ?? "")
        .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "")
        .replace(/on\w+=/gi, "data-removed=")
        .replace(/javascript:/gi, "");
    }

    async function loadLatest() {
      try {
        const res = await fetch(`${API_BASE}/latest?limit=5`);
        const rows = await res.json();
        latestPostsEl.innerHTML = rows.map(item => `
          <a class="mini-link" href="/insight.html?slug=${encodeURIComponent(item.slug)}">
            <strong>${escapeHtml(item.title)}</strong>
            <span>${formatDate(item.published_date)}</span>
          </a>
        `).join("");
      } catch {
        latestPostsEl.innerHTML = `<p>최근 글을 불러오지 못했습니다.</p>`;
      }
    }

    async function loadPost() {
      const slug = getSlug();
      if (!slug) {
        articleWrap.innerHTML = `
          <div class="error-box">
            <strong>잘못된 접근입니다.</strong>
            주소에 slug 값이 없습니다. 블로그 목록으로 돌아가 글을 다시 선택해 주세요.
          </div>
        `;
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error("failed");
        const post = await res.json();

        document.title = `${post.seo_title || post.title} | MarketHunters 블로그`;
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc && post.seo_description) metaDesc.setAttribute("content", post.seo_description);

        articleWrap.innerHTML = `
          <div class="article-top">
            <div>
              <span class="article-kicker">${escapeHtml(categoryLabel[post.category] || "블로그")}</span>
              <h1 class="article-title">${escapeHtml(post.title)}</h1>
              <p class="article-summary">${escapeHtml(post.summary || "핵심 포인트를 읽기 쉽게 정리한 글입니다.")}</p>
              <div class="article-meta">
                <span>작성자 ${escapeHtml(post.author || "Markethunters")}</span>
                <span>작성일 ${formatDate(post.published_date)}</span>
              </div>
            </div>
          </div>
          <div class="article-body">${sanitizeHtml(post.content)}</div>
        `;
      } catch (error) {
        articleWrap.innerHTML = `
          <div class="error-box">
            <strong>글을 불러오지 못했습니다.</strong>
            API 연결 상태와 slug 값을 확인해 주세요.
          </div>
        `;
      }
    }

    loadPost();
    loadLatest();
  </script>
</body>
</html>
