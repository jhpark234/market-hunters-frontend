<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MarketHunters 블로그</title>
  <meta name="description" content="MarketHunters 블로그 상세 글" />
  <meta name="theme-color" content="#07172f" />
  <meta name="robots" content="index, follow" />

  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }

    body{
      background: radial-gradient(circle at top, #0b1d3a 0%, #061427 45%, #04101e 100%);
      color:#eaf2ff;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }

    .container{
      width:min(920px, calc(100% - 28px));
      margin:0 auto;
      padding:28px 0 120px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:16px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      color:#d8e5f8;
      font-size:14px;
      font-weight:800;
    }

    .article{
      background: linear-gradient(180deg, rgba(10,28,57,.96), rgba(5,20,40,.98));
      border:1px solid rgba(91,138,214,.22);
      border-radius:28px;
      padding:34px;
      box-shadow:0 16px 36px rgba(0,0,0,.26);
    }

    .chip{
      display:inline-flex;
      align-items:center;
      height:34px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(81,132,255,.18);
      color:#dce9ff;
      font-size:13px;
      font-weight:800;
      letter-spacing:-.01em;
      border:1px solid rgba(255,255,255,.05);
    }

    h1{
      margin:18px 0 12px;
      font-size:42px;
      line-height:1.28;
      color:#f5f8ff;
      letter-spacing:-.03em;
      word-break:keep-all;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      color:#9fb3ce;
      font-size:14px;
      margin-bottom:22px;
      font-weight:700;
    }

    .meta-badge{
      display:inline-flex;
      align-items:center;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.05);
      color:#d9e6fb;
      font-size:13px;
      font-weight:800;
    }

    .summary{
      color:#d2def0;
      font-size:18px;
      line-height:1.85;
      margin:0 0 28px;
      padding:18px 20px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.05);
      word-break:keep-all;
    }

    .content{
      color:#dbe7f7;
      font-size:18px;
      line-height:1.95;
      word-break:keep-all;
    }

    .content h2{
      margin:34px 0 14px;
      font-size:28px;
      line-height:1.4;
      color:#ffffff;
      letter-spacing:-.02em;
    }

    .content p{
      margin:0 0 18px;
    }

    .content ul{
      margin:0 0 18px 20px;
      padding:0;
    }

    .content li{
      margin-bottom:10px;
    }

    .empty{
      background: linear-gradient(180deg, rgba(10,28,57,.96), rgba(5,20,40,.98));
      border:1px solid rgba(91,138,214,.22);
      border-radius:28px;
      padding:28px;
      color:#afc1da;
      line-height:1.8;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      width:min(92vw, 640px);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      padding:10px;
      z-index:40;
      border-radius:24px;
      background:rgba(6,19,40,.82);
      backdrop-filter: blur(16px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 34px rgba(0,0,0,.28);
    }

    .bottom-item{
      padding:12px 10px;
      border-radius:16px;
      text-align:center;
      color:#cad7ec;
      font-weight:800;
      font-size:15px;
    }

    .bottom-item.active{
      background:#0a2244;
      color:#ffffff;
    }

    @media (max-width: 640px){
      .container{
        width:min(100%, calc(100% - 16px));
        padding:18px 0 120px;
      }

      .article{
        padding:22px 18px;
        border-radius:22px;
      }

      h1{
        font-size:30px;
      }

      .summary,
      .content{
        font-size:16px;
      }

      .content h2{
        font-size:24px;
      }

      .bottom-nav{
        width:min(94vw, 640px);
      }

      .bottom-item{
        font-size:14px;
        padding:12px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/insights.html" class="back-link">← 블로그 목록으로</a>
    <div id="postWrap" class="empty">글을 불러오는 중입니다...</div>
  </div>

  <nav class="bottom-nav">
    <a href="/index.html" class="bottom-item">홈</a>
    <a href="/index.html#search-section" class="bottom-item">검색</a>
    <a href="/index.html#calendar-section" class="bottom-item">지표</a>
    <a href="/stock.html?symbol=NVDA" class="bottom-item">종목</a>
    <a href="/insights.html" class="bottom-item active">블로그</a>
  </nav>

  <script>
    const API_BASE = "https://api.markethunters.kr/api/content";

    function cleanHtml(html) {
      return String(html || "")
        .replace(/```html/gi, "")
        .replace(/```/g, "")
        .replace(/<\/?title>/gi, "")
        .replace(/<\/?html>/gi, "")
        .replace(/<\/?head>/gi, "")
        .replace(/<\/?body>/gi, "")
        .trim();
    }

    function cleanText(text) {
      return String(text || "")
        .replace(/```html/gi, "")
        .replace(/```/g, "")
        .replace(/<\/?title>/gi, "")
        .replace(/^\s*제목\s*:\s*/i, "")
        .replace(/^\s*요약\s*:\s*/i, "")
        .trim();
    }

    function getId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function formatDate(value) {
      if (!value) return "";
      return String(value).replaceAll("-", ".");
    }

    async function loadPost() {
      const id = getId();
      const wrap = document.getElementById("postWrap");

      if (!id) {
        wrap.innerHTML = "잘못된 접근입니다. id 값이 없습니다.";
        return;
      }

      try {
        const url = `${API_BASE}/detail?id=${encodeURIComponent(id)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data || !data.length) {
          wrap.innerHTML = `글을 찾을 수 없습니다.<br><br>id: ${id}`;
          return;
        }

        const post = data[0];
        const title = cleanText(post.title || "");
        const summary = cleanText(post.summary || "");
        const category = post.category || "블로그";

        document.title = `${title} | MarketHunters 블로그`;

        wrap.className = "article";
        wrap.innerHTML = `
          <span class="chip">${category}</span>
          <h1>${title}</h1>

          <div class="meta">
            <span class="meta-badge">${category}</span>
            <span>작성자 ${post.author || "Markethunters"}</span>
            <span>작성일 ${formatDate(post.published_date || "")}</span>
          </div>

          <p class="summary">${summary}</p>

          <div class="content">${cleanHtml(post.content || "")}</div>
        `;
      } catch (e) {
        wrap.innerHTML = "글을 불러오지 못했습니다. API 또는 배포 상태를 확인해 주세요.";
        console.error("loadPost error:", e);
      }
    }

    loadPost();
  </script>
</body>
</html>
