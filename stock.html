<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PLXLJ4RX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="mobile-app-shell">
    <div class="detail-shell stock-ai-shell">
      <header class="detail-topbar compact-topbar stock-ai-topbar">
        <a href="index.html" class="back-link">← 홈으로</a>
        <div class="lang-switch">
          <a href="/stock.html" class="lang-btn">🇰🇷 KR</a>
          <a href="/en/stock.html" class="lang-btn">🇺🇸 EN</a>
        </div>
      </header>

      <section class="stock-ai-hero detail-card">
        <div class="stock-ai-hero-grid">
          <div class="stock-ai-copy">
            <div class="detail-kicker">AI Stock Intelligence</div>
            <div class="stock-ai-name-wrap">
              <h1 id="stock-title">종목 상세</h1>
              <div class="stock-ai-symbol-line">
                <span id="stock-market" class="detail-pill">-</span>
                <span id="stock-exchange" class="detail-pill ghost">-</span>
                <span id="stock-currency" class="detail-pill ghost">-</span>
              </div>
            </div>
            <p id="stock-subtitle" class="stock-ai-subtitle">AI 분석과 뉴스 요약을 실전형 화면으로 정리했습니다.</p>
            <div class="stock-ai-tags">
              <span class="stock-ai-tag">AI 분석</span>
              <span class="stock-ai-tag">시장 해설</span>
              <span class="stock-ai-tag">뉴스 요약</span>
            </div>
          </div>

          <div class="stock-ai-price-panel">
            <div class="stock-ai-price-box">
              <div class="metric-label">현재가</div>
              <div class="stock-ai-price" id="stock-price">-</div>
              <div class="stock-ai-change-wrap">
                <span class="stock-change flat stock-ai-change" id="stock-change">-</span>
              </div>
            </div>
            <div class="stock-ai-signal-grid">
              <div class="stock-ai-signal-card">
                <div class="metric-label">AI 별점</div>
                <div class="stock-ai-signal-value" id="stock-rating">-</div>
              </div>
              <div class="stock-ai-signal-card">
                <div class="metric-label">산업 / 메모</div>
                <div class="stock-ai-signal-text" id="stock-industry">-</div>
              </div>
              <div class="stock-ai-signal-card stock-ai-signal-card-wide">
                <div class="metric-label">AI 한줄 요약</div>
                <div class="stock-ai-signal-text" id="stock-summary">-</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="stock-ai-snapshot-grid">
        <article class="detail-card stock-ai-glow-card">
          <div class="chart-header-row stock-ai-card-head">
            <div>
              <div class="detail-kicker">AI Price Map</div>
              <h2>최근 가격 추이</h2>
            </div>
            <select id="chart-period" class="period-select">
              <option value="1D">일</option>
              <option value="1W">주</option>
              <option value="1M" selected>월</option>
              <option value="6M">6개월</option>
            </select>
          </div>
          <div class="stock-ai-chart-shell">
            <canvas id="stock-chart" height="280"></canvas>
          </div>
        </article>

        <article class="detail-card stock-ai-brief-card">
          <div class="stock-ai-brief-head">
            <div>
              <div class="detail-kicker">AI Brief</div>
              <h2>한눈에 보는 종목 해석</h2>
            </div>
            <div id="stock-ai-time" class="meta-time">생성: -</div>
          </div>
          <div id="stock-ai-brief" class="bullet-list"></div>
        </article>
      </section>

      <section class="stock-ai-content-grid">
        <article class="detail-card stock-ai-news-card">
          <div class="stock-ai-brief-head">
            <div>
              <div class="detail-kicker">News Summary</div>
              <h2>뉴스 한글 요약</h2>
            </div>
            <div id="news-summary-time" class="meta-time">생성: -</div>
          </div>
          <div id="news-summary" class="bullet-list"></div>

          <div class="stock-ai-news-list-wrap">
            <h3>최근 뉴스</h3>
            <div id="news-list" class="history-table"></div>
          </div>
        </article>

        <article class="detail-card disclaimer-card stock-ai-legal-card">
          <div class="detail-kicker">Notice</div>
          <h2>안내</h2>
          <div id="stock-legal" class="bullet-list"></div>
        </article>
      </section>
    </div>
