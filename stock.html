<body>
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PLXLJ4RX" height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <div class="mobile-app-shell">
    <div class="detail-shell">
      <header class="detail-topbar compact-topbar">
        <a href="index.html" class="back-link">← 홈으로</a>
        <div class="detail-title-wrap stock-title-wrap">
          <div class="detail-kicker">Stock Intelligence</div>
          <h1 id="stock-title">종목 상세</h1>
          <p id="stock-subtitle">AI 분석과 뉴스 요약을 실전형 화면으로 정리했습니다.</p>
        </div>

        <div class="lang-switch">
          <a href="/stock.html" class="lang-btn">🇰🇷 KR</a>
          <a href="/en/stock.html" class="lang-btn">🇺🇸 EN</a>
        </div>
        
      </header>

      <section class="detail-grid stock-detail-grid">
        <div class="detail-card">
          <div class="detail-meta-row">
            <span id="stock-market" class="detail-pill">-</span>
            <span id="stock-exchange" class="detail-pill ghost">-</span>
            <span id="stock-currency" class="detail-pill ghost">-</span>
          </div>

          <div class="metric-grid">
            <div class="metric-card">
              <div class="metric-label">현재가</div>
              <div class="metric-value" id="stock-price">-</div>
            </div>

            <div class="metric-card">
              <div class="metric-label">등락률</div>
              <div class="metric-value stock-change flat" id="stock-change">-</div>
            </div>

            <div class="metric-card">
              <div class="metric-label">산업 / 메모</div>
              <div class="metric-value small" id="stock-industry">-</div>
            </div>

            <div class="metric-card">
              <div class="metric-label">요약</div>
              <div class="metric-value small" id="stock-summary">-</div>
            </div>

            <div class="metric-card metric-card-wide">
              <div class="metric-label">AI 별점</div>
              <div class="metric-value small" id="stock-rating">-</div>
            </div>
          </div>
        </div>

        <div class="detail-card">
          <div class="chart-header-row">
            <h2>최근 가격 추이</h2>
            <select id="chart-period" class="period-select">
              <option value="1D">일</option>
              <option value="1W">주</option>
              <option value="1M" selected>월</option>
              <option value="6M">6개월</option>
            </select>
          </div>
          <canvas id="stock-chart" height="280"></canvas>
        </div>
      </section>

      <section class="detail-grid second">
        <div class="detail-card">
          <h2>AI 종목 분석</h2>
          <div id="stock-ai-time" class="meta-time">생성: -</div>
          <div id="stock-ai-brief" class="bullet-list"></div>
        </div>

        <div class="detail-card">
          <h2>뉴스 한글 요약</h2>
          <div id="news-summary-time" class="meta-time">생성: -</div>
          <div id="news-summary" class="bullet-list"></div>

          <h3>최근 뉴스</h3>
          <div id="news-list" class="history-table"></div>
        </div>
      </section>

      <section class="detail-card disclaimer-card">
        <h2>안내</h2>
        <div id="stock-legal" class="bullet-list"></div>
      </section>
    </div>
